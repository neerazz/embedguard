name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    env:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      PYTHONHASHSEED: "0"
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install core and development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run offline test suite
        run: python -m pytest -q --no-cov
      - name: Run static-safety gate
        run: python -m ruff check .
      - name: Run one-command reproduction path
        if: matrix.python-version == '3.14'
        run: RESULTS_DIR=/tmp/embedguard-ci-results PYTHON=python ./reproduce.sh
      - name: Build and validate distributions
        run: python -m build && python -m twine check dist/*
